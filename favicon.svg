<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="4" fill="#004539"/>
  <!-- Rentra symbol: stylized leaf/flame motif in gold -->
  <g fill="#ddad75" transform="translate(16,16)">
    <!-- Center vertical -->
    <path d="M0,-8 C0,-8 2,-4 0,0 C-2,-4 0,-8 0,-8Z"/>
    <!-- Left branch -->
    <path d="M0,0 C-2,-3 -6,-3 -7,-1 C-5,-2 -2,-1 0,0Z"/>
    <!-- Right branch -->
    <path d="M0,0 C2,-3 6,-3 7,-1 C5,-2 2,-1 0,0Z"/>
    <!-- Left lower -->
    <path d="M0,0 C-2,1 -5,3 -5,5 C-3,3 -1,2 0,0Z"/>
    <!-- Right lower -->
    <path d="M0,0 C2,1 5,3 5,5 C3,3 1,2 0,0Z"/>
    <!-- Bottom -->
    <path d="M0,0 C0,2 -1,5 0,7 C1,5 0,2 0,0Z"/>
  </g>
</svg>
